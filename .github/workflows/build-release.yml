name: Build & Release

on:
  # 推送 tag 时触发（如 v0.0.1）
  push:
    tags:
      - 'v*'
  # 手动触发
  workflow_dispatch:
    inputs:
      version:
        description: '版本号（如 v0.0.3），创建 Release 时必填'
        required: false
        type: string
      release:
        description: '是否创建 Release'
        required: false
        default: 'false'
        type: boolean

# 取消正在运行的相同工作流
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14   # Apple Silicon (M 芯片) runner，构建 arm64
            platform: mac-arm64
            arch: arm64
            artifact-name: macos-arm64
          - os: macos-14   # 同一 runner 交叉编译 x64
            platform: mac-x64
            arch: x64
            artifact-name: macos-x64
          - os: ubuntu-latest
            platform: linux
            artifact-name: linux-x64
          - os: windows-latest
            platform: windows
            artifact-name: windows-x64

    runs-on: ${{ matrix.os }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-${{ hashFiles('bun.lockb') }}
          restore-keys: |
            node-modules-${{ runner.os }}-

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/electron
            ~/.cache/electron
            ~/AppData/Local/electron/Cache
          key: electron-${{ runner.os }}-39.2.7

      - name: Install dependencies
        run: bun install
        env:
          ELECTRON_GET_TIMEOUT: 300000

      # 构建 API sidecar
      - name: Build API sidecar (macOS ARM64)
        if: matrix.platform == 'mac-arm64'
        run: bun run build:api:mac-arm

      - name: Build API sidecar (macOS x64)
        if: matrix.platform == 'mac-x64'
        run: bun run build:api:mac-intel

      - name: Build API sidecar (Linux)
        if: matrix.platform == 'linux'
        run: bun run build:api:linux

      - name: Build API sidecar (Windows)
        if: matrix.platform == 'windows'
        run: bun run build:api:windows

      # 构建 CLI bundle
      - name: Build CLI bundle (macOS ARM64)
        if: matrix.platform == 'mac-arm64'
        run: bun run build:cli:mac-arm

      - name: Build CLI bundle (macOS x64)
        if: matrix.platform == 'mac-x64'
        run: bun run build:cli:mac-intel

      - name: Build CLI bundle (Linux)
        if: matrix.platform == 'linux'
        run: bun run build:cli:linux

      - name: Build CLI bundle (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: bun run build:cli:windows

      # 构建前端和 Electron
      - name: Build React app
        run: bun run build

      - name: Transpile Electron
        run: bun run transpile:electron

      # 打包应用
      - name: Package (macOS ARM64)
        if: matrix.platform == 'mac-arm64'
        run: npx electron-builder --mac --arm64
        env:
          BUILD_ARCH: arm64
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (macOS x64)
        if: matrix.platform == 'mac-x64'
        run: npx electron-builder --mac --x64
        env:
          BUILD_ARCH: x64
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (Linux)
        if: matrix.platform == 'linux'
        run: npx electron-builder --linux --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Package (Windows)
        if: matrix.platform == 'windows'
        run: npx electron-builder --win --x64
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 直接上传到 GitHub Release（绕过 artifact 配额限制）
      - name: Publish release assets
        if: startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.release == 'true')
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.ref_name || github.event.inputs.version }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:RELEASE_TAG)) {
            throw "RELEASE_TAG is empty. For workflow_dispatch, please provide inputs.version."
          }

          $patterns = @("dist/*.dmg", "dist/*.AppImage", "dist/*.exe", "dist/*.zip")
          $files = @()
          foreach ($pattern in $patterns) {
            $files += Get-ChildItem -Path $pattern -File -ErrorAction SilentlyContinue | ForEach-Object { $_.FullName }
          }

          if ($files.Count -eq 0) {
            Write-Host "No release files found for this matrix target, skip upload."
            exit 0
          }

          gh release view "$env:RELEASE_TAG" *> $null
          if ($LASTEXITCODE -ne 0) {
            # First finisher may create release; parallel creators can race safely.
            gh release create "$env:RELEASE_TAG" --generate-notes
          }

          foreach ($file in $files) {
            gh release upload "$env:RELEASE_TAG" "$file" --clobber
          }
