# ═══════════════════════════════════════════════════════════════════════════════
# VK-Cowork · VVIP EduCare Hand
# 青少儿 VVIP 教务服务自治引擎
# ═══════════════════════════════════════════════════════════════════════════════

id = "vvip-educare"
name = "VVIP EduCare Hand"
description = "青少儿 VVIP 教务全流程自治引擎 — 建档、提醒、盯课、反馈、归档、月报，一站式极致跟进"
category = "communication"
icon = "🎓"

# ─── 工具白名单 ─────────────────────────────────────────────────────────────
# 分层设计：文件操作 + 网络 + 记忆 + 调度 + 知识图谱 + 事件
tools = [
    # 文件：课件/回放/反馈的本地读写与归档
    "file_read", "file_write", "file_list",
    # 网络：Zoom API、飞书 API、AI 补位素材抓取
    "web_fetch", "web_search",
    # 命令行：yt-dlp 下载回放、ffmpeg 处理视频片段
    "shell_exec",
    # 记忆：学生画像、课时统计、家校沟通历史
    "memory_store", "memory_recall",
    # 调度：课前提醒、月报、课时结算的定时任务
    "schedule_create", "schedule_list", "schedule_delete",
    # 知识图谱：学生-老师-课程-目标的关系网络
    "knowledge_add_entity", "knowledge_add_relation", "knowledge_query",
    # 事件：异常情况报警（学生缺课、老师无反馈等）
    "event_publish",
]

# ─── MCP 服务器白名单 ───────────────────────────────────────────────────────
# 仅允许访问教务相关的 MCP 服务
mcp_servers = [
    "dingtalk-ai-table",    # 钉钉多维表：课时核算、教师工资结算
    "dingtalk-contacts",    # 钉钉通讯录：教师信息查询
    "exa",                  # 深度搜索：AI 补位时查找学习资源
]


# ═══════════════════════════════════════════════════════════════════════════════
# 前置依赖检查 [[requires]]
# 激活前必须满足的条件，不满足则拒绝激活并提供安装指引
# ═══════════════════════════════════════════════════════════════════════════════

# ─── 飞书应用凭证（学习文档归档 + 文件夹管理）─────────────────────────────
[[requires]]
key = "FEISHU_APP_ID"
label = "飞书应用 App ID"
requirement_type = "api_key"
check_value = "FEISHU_APP_ID"
description = "飞书开放平台自建应用的 App ID，用于调用飞书文档/云盘 API 进行学习文档管理和课程资料归档。"

[requires.install]
signup_url = "https://open.feishu.cn/app"
docs_url = "https://open.feishu.cn/document/server-docs/docs/docs/overview"
env_example = "FEISHU_APP_ID=cli_xxxxxxxxxxxxxx"
estimated_time = "5-10 min"
steps = [
    "登录 open.feishu.cn 创建自建应用",
    "获取 App ID 和 App Secret",
    "开通「云文档」「多维表格」权限",
    "发布应用并在目标群/租户中可用",
]

[[requires]]
key = "FEISHU_APP_SECRET"
label = "飞书应用 App Secret"
requirement_type = "api_key"
check_value = "FEISHU_APP_SECRET"
description = "飞书自建应用的 App Secret，与 App ID 配对使用。"

[requires.install]
signup_url = "https://open.feishu.cn/app"
env_example = "FEISHU_APP_SECRET=xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
estimated_time = "同上，创建应用时一并获取"

# ─── Zoom 凭证（会议链接创建 + 回放下载）────────────────────────────────────
[[requires]]
key = "ZOOM_ACCOUNT_ID"
label = "Zoom Server-to-Server OAuth Account ID"
requirement_type = "api_key"
check_value = "ZOOM_ACCOUNT_ID"
description = "Zoom Server-to-Server OAuth 的 Account ID，用于创建固定课程链接和下载云端录制回放。"

[requires.install]
signup_url = "https://marketplace.zoom.us/develop/create"
docs_url = "https://developers.zoom.us/docs/internal-apps/s2s-oauth/"
env_example = "ZOOM_ACCOUNT_ID=xxxxxxxx"
estimated_time = "10-15 min"
steps = [
    "登录 marketplace.zoom.us",
    "创建 Server-to-Server OAuth App",
    "添加 meeting:write + recording:read scope",
    "获取 Account ID、Client ID、Client Secret",
    "激活应用",
]

[[requires]]
key = "ZOOM_CLIENT_ID"
label = "Zoom Client ID"
requirement_type = "api_key"
check_value = "ZOOM_CLIENT_ID"
description = "Zoom Server-to-Server OAuth 的 Client ID。"

[requires.install]
signup_url = "https://marketplace.zoom.us/develop/create"
env_example = "ZOOM_CLIENT_ID=xxxxxxxx"
estimated_time = "同上"

[[requires]]
key = "ZOOM_CLIENT_SECRET"
label = "Zoom Client Secret"
requirement_type = "api_key"
check_value = "ZOOM_CLIENT_SECRET"
description = "Zoom Server-to-Server OAuth 的 Client Secret。"

[requires.install]
signup_url = "https://marketplace.zoom.us/develop/create"
env_example = "ZOOM_CLIENT_SECRET=xxxxxxxx"
estimated_time = "同上"


